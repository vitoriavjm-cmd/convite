<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Aniversário Maria Ester 🎂</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #fce4ec;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow-x: hidden;
    position: relative;
    font-family: sans-serif;
  }

  /* Confetti canvas fixo no fundo */
  #canvas-bg {
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 0;
  }

  /* Balões */
  .balloon-wrap {
    position: fixed;
    bottom: -130px;
    pointer-events: none;
    z-index: 1;
    animation: floatUp linear infinite;
  }
  .balloon {
    width: 42px; height: 52px;
    border-radius: 50% 50% 50% 50% / 55% 55% 45% 45%;
    position: relative;
    animation: sway ease-in-out infinite alternate;
  }
  .balloon::after {
    content: '';
    position: absolute;
    bottom: -20px; left: 50%;
    transform: translateX(-50%);
    width: 1px; height: 22px;
    background: rgba(0,0,0,0.2);
  }
  @keyframes floatUp {
    0%   { transform: translateY(0);    opacity: 0; }
    5%   { opacity: 1; }
    95%  { opacity: 1; }
    100% { transform: translateY(-115vh); opacity: 0; }
  }
  @keyframes sway {
    from { transform: rotate(-9deg); }
    to   { transform: rotate(9deg); }
  }

  /* Wrapper das páginas */
  .scene {
    position: relative;
    z-index: 2;
    width: 100%;
    max-width: 430px;
    padding: 20px 16px;
  }

  /* ---- CARD BASE ---- */
  .invite-card {
    position: relative;
    width: 100%;
    /* aspect-ratio 1080:1920 = 9:16 */
    aspect-ratio: 9 / 16;
    border-radius: 18px;
    overflow: hidden;
    box-shadow: 0 12px 50px rgba(244,143,177,0.45), 0 4px 12px rgba(0,0,0,0.12);
    cursor: default;
  }

  /* Imagem de fundo = o template original */
  .invite-card .bg-img {
    position: absolute;
    inset: 0;
    width: 100%; height: 100%;
    object-fit: cover;
    display: block;
  }

  /* Camada de cliques sobre a imagem */
  .hotspot-layer {
    position: absolute;
    inset: 0;
    z-index: 10;
  }

  /* Área clicável — invisível por padrão, só cursor pointer */
  .hotspot {
    position: absolute;
    cursor: pointer;
    border-radius: 50%;
    transition: transform 0.18s;
  }
  .hotspot:hover { transform: scale(1.08); }
  .hotspot:active { transform: scale(0.95); }

  /* Pulse ring ao redor dos botões */
  .hotspot::before {
    content: '';
    position: absolute;
    inset: -6px;
    border-radius: 50%;
    border: 2.5px solid rgba(240,98,146,0.5);
    animation: ring 2s ease-in-out infinite;
  }
  @keyframes ring {
    0%,100% { transform: scale(1);   opacity: 0.7; }
    50%      { transform: scale(1.18); opacity: 0; }
  }

  /* ---- MODAL ---- */
  .modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.58);
    z-index: 200;
    align-items: center;
    justify-content: center;
    padding: 20px;
  }
  .modal-overlay.active { display: flex; }

  .modal {
    background: white;
    border-radius: 28px;
    max-width: 390px;
    width: 100%;
    overflow: hidden;
    box-shadow: 0 20px 70px rgba(0,0,0,0.3);
    animation: modalPop 0.38s cubic-bezier(0.34,1.56,0.64,1) both;
  }
  @keyframes modalPop {
    from { transform: scale(0.6) translateY(60px); opacity: 0; }
    to   { transform: scale(1)   translateY(0);    opacity: 1; }
  }

  /* Cabeçalho do modal — usa a imagem de endereço como fundo */
  .modal-bg-img {
    width: 100%;
    aspect-ratio: 9/16;
    object-fit: cover;
    object-position: top;
    max-height: 65vh;
    display: block;
  }

  .modal-footer {
    padding: 16px 20px 20px;
    background: white;
  }

  .close-btn {
    position: absolute;
    top: 12px; right: 12px;
    width: 34px; height: 34px;
    border-radius: 50%;
    background: rgba(255,255,255,0.85);
    border: none;
    font-size: 18px;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    font-weight: 700;
    color: #ad1457;
    z-index: 10;
    transition: background 0.2s;
  }
  .close-btn:hover { background: white; }

  .modal-inner { position: relative; }

  .btn-maps {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    width: 100%;
    padding: 15px;
    background: linear-gradient(135deg, #ce93d8, #ab47bc);
    border: none;
    border-radius: 16px;
    color: white;
    font-size: 16px;
    font-weight: 800;
    font-family: sans-serif;
    cursor: pointer;
    text-decoration: none;
    letter-spacing: 0.3px;
    transition: transform 0.15s, box-shadow 0.15s;
  }
  .btn-maps:hover { transform: translateY(-2px); box-shadow: 0 8px 22px rgba(171,71,188,0.4); }

  /* Confetti pieces */
  .confetti-piece {
    position: fixed;
    border-radius: 2px;
    pointer-events: none;
    z-index: 999;
    animation: cfall linear forwards;
  }
  @keyframes cfall {
    0%   { opacity: 1; transform: translateY(0) rotate(0deg) translateX(0); }
    100% { opacity: 0; transform: translateY(85vh) rotate(720deg) translateX(var(--cx)); }
  }
</style>
</head>

<script>
// ====== LOCALIZAÇÃO ======
function openLocation() {
  document.getElementById('modal-location').classList.add('active');
  document.body.style.overflow = 'hidden';
}
function closeLocation() {
  document.getElementById('modal-location').classList.remove('active');
  document.body.style.overflow = '';
}
document.getElementById('modal-location').addEventListener('click', function(e) {
  if (e.target === this) closeLocation();
});

// ====== WHATSAPP ======
function confirmPresence() {
  // ← SUBSTITUA pelo número real: DDI+DDD+número, só dígitos
  const phone = '5584999787974';
  const msg = encodeURIComponent('Olá! Confirmo minha presença no aniversário de 9 anos da Maria Ester! 🎉🎂💕');
  window.open('https://wa.me/' + phone + '?text=' + msg, '_blank');
  launchConfetti();
}

// ====== CONFETTI ======
function launchConfetti() {
  const colors = ['#f48fb1','#ce93d8','#90caf9','#fff176','#a5d6a7','#ffcc80','#f06292','#80deea'];
  for (let i = 0; i < 90; i++) {
    const p = document.createElement('div');
    p.className = 'confetti-piece';
    const size = 7 + Math.random() * 9;
    p.style.cssText = `
      left: ${15 + Math.random() * 70}vw;
      top: 5vh;
      width: ${size}px;
      height: ${size}px;
      background: ${colors[Math.floor(Math.random()*colors.length)]};
      border-radius: ${Math.random()>.5?'50%':'3px'};
      --cx: ${(Math.random()-0.5)*260}px;
      animation-duration: ${1.4+Math.random()*2}s;
      animation-delay: ${Math.random()*0.7}s;
    `;
    document.body.appendChild(p);
    setTimeout(()=>p.remove(), 4000);
  }
}

// ====== BALLOONS ======
(function() {
  const colors = ['#f48fb1','#ce93d8','#90caf9','#a5d6a7','#ffcc80','#fff176','#80deea','#ffab91'];
  function spawn() {
    const wrap = document.createElement('div');
    wrap.className = 'balloon-wrap';
    wrap.style.left = (4 + Math.random()*92) + 'vw';
    const dur = 9 + Math.random()*8;
    wrap.style.animationDuration = dur + 's';
    wrap.style.animationDelay = (Math.random()*3) + 's';
    const b = document.createElement('div');
    b.className = 'balloon';
    b.style.background = colors[Math.floor(Math.random()*colors.length)];
    b.style.animationDuration = (1.4+Math.random()) + 's';
    wrap.appendChild(b);
    document.body.appendChild(wrap);
    setTimeout(()=>wrap.remove(), (dur+4)*1000);
  }
  for(let i=0;i<4;i++) setTimeout(spawn, i*700);
  setInterval(spawn, 2600);
})();

// ====== BG CANVAS (estrelas, corações, bolinhas) ======
(function() {
  const cv = document.getElementById('canvas-bg');
  const ctx = cv.getContext('2d');
  let W, H, pts=[];
  function resize() { W=cv.width=window.innerWidth; H=cv.height=window.innerHeight; }
  resize(); window.addEventListener('resize',resize);
  const colors=['#f48fb1','#ce93d8','#90caf9','#fff176','#a5d6a7','#ffcc80'];
  function mkPt() {
    return {x:Math.random()*W, y:Math.random()*H,
      r:2+Math.random()*5, c:colors[Math.floor(Math.random()*colors.length)],
      a:0.25+Math.random()*0.5, ph:Math.random()*Math.PI*2,
      sp:0.013+Math.random()*0.025, vy:-0.12-Math.random()*0.28,
      t:Math.floor(Math.random()*3)};
  }
  for(let i=0;i<60;i++) pts.push(mkPt());
  let tick=0;
  function draw() {
    ctx.clearRect(0,0,W,H); tick++;
    pts.forEach(p=>{
      p.y+=p.vy;
      if(p.y<-20){p.y=H+20;p.x=Math.random()*W;}
      const a=p.a*(0.5+0.5*Math.sin(tick*p.sp+p.ph));
      ctx.save(); ctx.globalAlpha=a; ctx.fillStyle=p.c;
      if(p.t===0){ // star
        ctx.beginPath();
        for(let i=0;i<5;i++){
          const ang=(i*4*Math.PI/5)-Math.PI/2;
          const ia=ang+2*Math.PI/5;
          if(i===0) ctx.moveTo(p.x+p.r*Math.cos(ang),p.y+p.r*Math.sin(ang));
          else ctx.lineTo(p.x+p.r*Math.cos(ang),p.y+p.r*Math.sin(ang));
          ctx.lineTo(p.x+p.r*.44*Math.cos(ia),p.y+p.r*.44*Math.sin(ia));
        }
        ctx.closePath(); ctx.fill();
      } else if(p.t===1){ // heart
        const r=p.r*.55;
        ctx.beginPath();
        ctx.moveTo(p.x,p.y+r*.3);
        ctx.bezierCurveTo(p.x,p.y-r*.4,p.x-r*1.1,p.y-r*.4,p.x-r*1.1,p.y+r*.1);
        ctx.bezierCurveTo(p.x-r*1.1,p.y+r*.7,p.x,p.y+r*1.2,p.x,p.y+r*1.2);
        ctx.bezierCurveTo(p.x,p.y+r*1.2,p.x+r*1.1,p.y+r*.7,p.x+r*1.1,p.y+r*.1);
        ctx.bezierCurveTo(p.x+r*1.1,p.y-r*.4,p.x,p.y-r*.4,p.x,p.y+r*.3);
        ctx.closePath(); ctx.fill();
      } else { // circle
        ctx.beginPath(); ctx.arc(p.x,p.y,p.r*.65,0,Math.PI*2); ctx.fill();
      }
      ctx.restore();
    });
    requestAnimationFrame(draw);
  }
  draw();
})();
</script>
